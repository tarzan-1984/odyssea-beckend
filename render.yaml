services:
  - type: web
    name: odyssea-backend
    env: node
    plan: starter
    # Playwright + Chromium for GET /v1/geocoding/here/reverse (HERE revgeocode intercept).
    # Browsers must live inside the repo — Render does not persist ~/.cache/ms-playwright from build to runtime.
    buildCommand: yarn install --frozen-lockfile && yarn playwright:install:render && yarn build
    startCommand: yarn start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: v1
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: odyssea-database
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-frontend-url.com
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: .playwright-browsers

databases:
  - name: odyssea-database
    plan: starter
    databaseName: odyssea
    user: odyssea_user
