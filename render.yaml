services:
  - type: web
    name: odyssea-backend
    env: node
    plan: starter
    # Playwright + Chromium for GET /v1/geocoding/here/reverse (HERE revgeocode intercept).
    # install-deps: OS libraries on Render's Linux image; install chromium: browser binary.
    buildCommand: yarn install --frozen-lockfile && yarn playwright install-deps chromium && yarn playwright install chromium && yarn build
    startCommand: yarn start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: v1
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: odyssea-database
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-frontend-url.com

databases:
  - name: odyssea-database
    plan: starter
    databaseName: odyssea
    user: odyssea_user
